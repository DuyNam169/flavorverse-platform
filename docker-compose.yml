version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flavorverse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: flavorverse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flavorverse123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flavorverse-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/flavorverse
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-flavorverse123}
      JWT_SECRET: ${JWT_SECRET:-flavorverse-secret-32chars-minimum-change-me}
      JWT_EXPIRY_MS: 900000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: flavorverse-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      BACKEND_URL: http://backend:8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flavorverse-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai-service

volumes:
  pgdata:

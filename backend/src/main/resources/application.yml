server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flavorverse}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:yourpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/api/auth/callback"

jwt:
  secret: ${JWT_SECRET:flavorverse-secret-key-change-in-production-min-32-chars}
  expiry-ms: ${JWT_EXPIRY_MS:900000}
  refresh-expiry-ms: 604800000

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8000}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    com.flavorverse: DEBUG
    org.springframework.security: WARN
